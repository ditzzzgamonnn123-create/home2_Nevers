<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGS Project - Blue Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            background: #020617;
        }

        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 25px;
            max-width: 850px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
        }

        h2 {
            color: rgba(125, 211, 252, 0.5);
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            border-radius: 18px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.5);
            color: rgba(241, 245, 249, 0.9);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(4px);
        }

        button i {
            width: 18px;
            height: 18px;
            color: #38bdf8;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: translateY(-3px);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.15);
            color: white;
        }

        button:hover i {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 0 8px #0ea5e9);
        }

        .btn-featured {
            border: 1px solid rgba(56, 189, 248, 0.4);
            background: rgba(14, 165, 233, 0.05);
            box-shadow: inset 0 0 15px rgba(14, 165, 233, 0.05);
        }

        .btn-contact {
            grid-column: 1 / -1;
            background: #075e54;
            border: none;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            border-radius: 18px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .btn-contact:hover {
            background: #128c7e;
            box-shadow: 0 10px 20px rgba(18, 140, 126, 0.2);
        }

        .btn-contact i {
            color: white;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            color: rgba(148, 163, 184, 0.4);
            letter-spacing: 1px;
        }

        footer span {
            color: #38bdf8;
            font-weight: bold;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.6rem; }
            h2 { font-size: 0.7rem; letter-spacing: 3px; }
            .grid-buttons { grid-template-columns: 1fr; }
            .container { padding: 30px 15px; }
        }
    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>

        <div class="container">

            <h2>Xeta Axata Project</h2>

                <a href="#" target="_blank">

                </a>

    </div>

    <script>
        lucide.createIcons();
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, columns;
        const fontSize = 16;
        let drops = [];
        const chars = 'XETA-AXATA-0101-BLUE-VERSION-7181892';

        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        window.addEventListener('resize', initMatrix);
        initMatrix();

        function draw() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.1)';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(56, 189, 248, 0.3)';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        function animate() {
            draw();
            setTimeout(() => {
                requestAnimationFrame(animate);
            }, 33);
        }

        animate();
    </script>
</body>
</html>
